trigger:
- master

pool:
  vmImage: 'windows-latest'

variables:
  projectPath: '**/SimplesCRUD.csproj'
  buildPlatform: 'x86'          # CORREÇÃO 1: Alterado de 'Any CPU' para 'x86' para bater com seu .csproj
  buildConfiguration: 'Release'

steps:
- task: NuGetToolInstaller@1
  displayName: 'Garantir Instalador do NuGet'

- powershell: |
    $csproj = Get-Item "$(projectPath)"
    $projectDir = $csproj.Directory.FullName
    $solutionDir = $csproj.Directory.Parent.FullName
    
    Write-Host "Diretório do projeto: $projectDir"
    Write-Host "Diretório da Solução (Raiz): $solutionDir"
    
    nuget restore "$($csproj.FullName)" -PackagesDirectory "$solutionDir\packages"
  displayName: 'Restaurar Pacotes NuGet via PowerShell'

- task: VSBuild@1
  displayName: 'Compilar Projeto WebForms / .NET Framework'
  inputs:
    solution: '$(projectPath)'
    platform: '$(buildPlatform)'
    configuration: '$(buildConfiguration)'
    # CORREÇÃO 2: Adicionado /p:OutputPath e /p:BaseOutputPath apontando para o diretório de staging do Azure
    msbuildArgs: '/p:OutputPath="$(build.artifactStagingDirectory)" /p:BaseOutputPath="$(build.artifactStagingDirectory)" /p:DeployOnBuild=true /p:WebPublishMethod=Package /p:PackageAsSingleFile=true /p:SkipInvalidConfigurations=true'
    clean: true

- task: PublishBuildArtifacts@1
  displayName: 'Publicar Artefato Gerado'
  inputs:
    PathtoPublish: '$(build.artifactStagingDirectory)'
    ArtifactName: 'drop-webforms'
    publishLocation: 'Container'
